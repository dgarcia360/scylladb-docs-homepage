# lychee configuration for the weekly link check.
# Reference: https://github.com/lycheeverse/lychee/blob/master/lychee.example.toml

# Be polite to upstream sites.
max_concurrency = 8
max_redirects = 5
timeout = 30

# Retry transient failures so we don't report flakes as broken links.
retry_wait_time = 5
max_retries = 3

# Treat these as healthy. Many docs links return 403/429 to bots without it
# meaning the page is broken; rate limiting and bot detection are common.
accept = [
  "200..=299",
  "403",
  "429",
]

# Skip mailto links and loopback URLs.
include_mail = false
exclude_loopback = true

exclude = [
  # Localhost dev preview URLs. lychee's `exclude_loopback` covers
  # 127.0.0.0/8 but not the all-zeros address, so we add it here.
  "^https?://0\\.0\\.0\\.0",

  # Workaround for a Sphinx config bug on developers.scylladb.com: every page
  # emits `<link rel="canonical" href="developers.scylladb.com/..."/>` (no
  # scheme), which lychee resolves as a relative URL, producing a 404 like
  # `.../<page-dir>/developers.scylladb.com/<page-path>`. The real fix is to
  # set `html_baseurl = "https://developers.scylladb.com/"` in that repo's
  # conf.py; remove this entry once that ships.
  "^https?://developers\\.scylladb\\.com/.+/developers\\.scylladb\\.com/",
]

# Identify ourselves so server admins can contact us if needed.
user_agent = "scylladb-docs-link-check (+https://github.com/scylladb/scylladb-docs-homepage)"
